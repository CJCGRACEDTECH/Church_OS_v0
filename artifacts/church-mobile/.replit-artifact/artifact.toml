kind = "mobile"
previewPath = "/church-mobile/"
title = "CJC Church Mobile"
version = "1.0.0"
id = "artifacts/church-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/church-mobile/" ]
localPort = 18878

[services.development]
run = "pnpm --filter @workspace/church-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/church-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/church-mobile", "run", "serve" ]

[services.env]
PORT = "18878"
BASE_PATH = "/church-mobile/"
